<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .article-content {
      font-family: var(--font-reading);
      font-size: 18px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .article-content .highlight {
      background: linear-gradient(120deg, #fef3c7 0%, #fde68a 100%);
      padding: 0 4px;
      border-radius: 2px;
    }
    .explanation-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 340px;
      max-height: 85vh;
      overflow-y: auto;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      border: 1px solid var(--border);
    }
    .explanation-panel.visible { display: block; animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    .explanation-panel h3 {
      margin: 0 0 12px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .explanation-panel .term { font-weight: 600; color: var(--text); font-size: 16px; margin-bottom: 12px; }
    .explanation-panel .content { line-height: 1.6; color: var(--text); }
    .explanation-panel .content strong { font-weight: 600; color: var(--text); }
    .explanation-panel .loading { color: var(--text-muted); font-style: italic; }
    .explanation-panel .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .explanation-panel .close-btn:hover {
      background: var(--bg);
      color: var(--text);
    }
    .add-vocab-btn {
      margin-top: 16px;
      width: 100%;
    }
    .add-vocab-btn.added {
      background: var(--success) !important;
      color: white !important;
    }
    #article-scroll {
      max-height: 65vh;
      overflow-y: auto;
      margin-top: 12px;
    }
    .reading-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.15s ease;
    }
    .progress-pct {
      min-width: 3.5em;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <span class="brand">Article Reader</span>
      <a href="/vocabulary">Vocabulary</a>
      <a href="/quiz">Quiz</a>
      <a href="/summary" target="_blank">Summary</a>
    </nav>

    <h1>Read with context</h1>
    <p class="subtitle">Paste your article, import an EPUB book, or paste text below. Select any word or phrase to get a contextual explanation powered by AI.</p>

    <div class="card">
      <div class="action-bar" style="margin-bottom: 12px;">
        <button id="submit-btn" class="btn btn-primary">Display Article</button>
        <button id="import-epub-btn" class="btn btn-secondary">Import EPUB</button>
        <input type="file" id="epub-input" accept=".epub" style="display: none;">
      </div>
      <textarea id="article-input" placeholder="Paste your article here, or import an EPUB book..."></textarea>
      <p class="hint">Tip: Select text and press Alt+E (or Option+E on Mac) for quick explanation.</p>
    </div>

    <div id="article-container" class="card" style="display: none;">
      <h2 style="margin: 0; font-size: 1.1rem;">Article</h2>
      <div class="reading-progress">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div id="article-scroll">
        <div id="article-content" class="article-content"></div>
      </div>
    </div>
  </div>

  <div id="explanation-panel" class="explanation-panel">
    <span class="close-btn" id="close-panel" aria-label="Close">&times;</span>
    <h3>Explanation</h3>
    <div class="term" id="panel-term"></div>
    <div class="content" id="panel-content"></div>
    <button type="button" class="btn btn-secondary add-vocab-btn" id="add-vocab-btn" style="display: none;">Add to vocabulary</button>
  </div>

  <script>
    const articleInput = document.getElementById('article-input');
    const submitBtn = document.getElementById('submit-btn');
    const importEpubBtn = document.getElementById('import-epub-btn');
    const epubInput = document.getElementById('epub-input');
    const articleContainer = document.getElementById('article-container');
    const articleScroll = document.getElementById('article-scroll');
    const articleContent = document.getElementById('article-content');
    const explanationPanel = document.getElementById('explanation-panel');
    const panelTerm = document.getElementById('panel-term');
    const panelContent = document.getElementById('panel-content');
    const closePanelBtn = document.getElementById('close-panel');
    const addVocabBtn = document.getElementById('add-vocab-btn');
    const progressFill = document.getElementById('progress-fill');
    const progressPct = document.getElementById('progress-pct');

    function updateProgress() {
      const { scrollTop, scrollHeight, clientHeight } = articleScroll;
      const maxScroll = scrollHeight - clientHeight;
      const pct = maxScroll <= 0 ? 100 : Math.round((scrollTop / maxScroll) * 100);
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
    }

    let currentArticle = '';
    let currentBookId = null;
    let lastExplanation = { word: '', concise_meaning: '' };
    let savePositionTimeout = null;

    submitBtn.addEventListener('click', () => {
      currentBookId = null;
      currentArticle = articleInput.value.trim();
      if (!currentArticle) return;

      articleContent.textContent = currentArticle;
      articleContainer.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(updateProgress));
    });

    importEpubBtn.addEventListener('click', () => epubInput.click());

    epubInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      importEpubBtn.disabled = true;
      importEpubBtn.textContent = 'Importing...';
      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/import-epub', {
          method: 'POST',
          body: formData,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const msg = typeof err.detail === 'string' ? err.detail : (err.detail?.[0]?.msg || res.statusText);
          throw new Error(msg || 'Import failed');
        }
        const data = await res.json();
        articleInput.value = data.text;
        currentArticle = data.text;
        currentBookId = data.book_id;
        articleContent.textContent = data.text;
        articleContainer.style.display = 'block';
        articleScroll.scrollTop = 0;
        if (currentBookId) {
          const posRes = await fetch(`/api/reading-position?book_id=${currentBookId}`);
          const posData = await posRes.json();
          if (posData.position != null) {
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                articleScroll.scrollTop = posData.position;
                updateProgress();
              });
            });
          }
        }
        updateProgress();
      } catch (err) {
        alert('Error: ' + err.message);
      }
      importEpubBtn.disabled = false;
      importEpubBtn.textContent = 'Import EPUB';
      epubInput.value = '';
    });

    function getSentenceContaining(text, fullText) {
      const idx = fullText.indexOf(text);
      if (idx === -1) return text;

      const before = fullText.slice(0, idx);
      const after = fullText.slice(idx + text.length);

      const lastDot = Math.max(before.lastIndexOf('.'), before.lastIndexOf('?'), before.lastIndexOf('!'));
      const start = lastDot === -1 ? 0 : lastDot + 1;

      const enders = [after.indexOf('.'), after.indexOf('?'), after.indexOf('!')].filter(x => x >= 0);
      const endOffset = enders.length ? Math.min(...enders) + 1 : after.length;
      const end = idx + text.length + endOffset;

      return fullText.slice(start, end).trim();
    }

    async function explainSelection() {
      const selection = window.getSelection();
      const selectedText = selection.toString().trim();

      if (!selectedText || selectedText.length > 100) return;
      if (!currentArticle) return;

      const fullSentence = getSentenceContaining(selectedText, currentArticle);

      explanationPanel.classList.add('visible');
      panelTerm.textContent = '"' + selectedText + '"';
      panelContent.textContent = 'Loading...';
      panelContent.className = 'content loading';
      addVocabBtn.style.display = 'none';

      try {
        const res = await fetch('/api/explain', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            selected_text: selectedText,
            full_sentence: fullSentence
          })
        });
        const data = await res.json();
        const raw = data.explanation || 'No explanation available.';
        panelContent.innerHTML = formatExplanation(raw);
        panelContent.className = 'content';

        lastExplanation = { word: selectedText, concise_meaning: data.concise_meaning || '' };
        addVocabBtn.style.display = 'block';
        addVocabBtn.textContent = 'Add to vocabulary';
        addVocabBtn.classList.remove('added');
      } catch (err) {
        panelContent.textContent = 'Error: ' + err.message;
        panelContent.className = 'content';
      }
    }

    function formatExplanation(text) {
      const escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    articleScroll.addEventListener('scroll', () => {
      updateProgress();
      if (!currentBookId) return;
      clearTimeout(savePositionTimeout);
      savePositionTimeout = setTimeout(() => {
        fetch('/api/reading-position', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ book_id: currentBookId, position: articleScroll.scrollTop, filename: '' })
        }).catch(() => {});
      }, 500);
    });

    articleContent.addEventListener('mouseup', () => {
      setTimeout(() => {
        const sel = window.getSelection();
        if (sel.toString().trim()) {
          explainSelection();
        }
      }, 10);
    });

    document.addEventListener('keydown', (e) => {
      if ((e.altKey || e.metaKey) && e.key === 'e') {
        e.preventDefault();
        explainSelection();
      }
    });

    closePanelBtn.addEventListener('click', () => {
      explanationPanel.classList.remove('visible');
    });

    addVocabBtn.addEventListener('click', async () => {
      if (!lastExplanation.word || !lastExplanation.concise_meaning) return;
      addVocabBtn.disabled = true;
      try {
        const res = await fetch('/api/vocabulary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(lastExplanation)
        });
        if (res.ok) {
          addVocabBtn.textContent = 'Added ✓';
          addVocabBtn.classList.add('added');
        }
      } catch (err) {
        addVocabBtn.textContent = 'Error';
      }
      addVocabBtn.disabled = false;
    });
  </script>
</body>
</html>
