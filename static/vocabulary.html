<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary - Article Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/usage.js"></script>
  <style>
    .btn-delete { padding: 6px 12px; font-size: 12px; }
    table input, table select { margin: 0; }
    table td:last-child { width: 90px; }
    .bulk-actions {
      display: none; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--accent-light); border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .bulk-actions.visible { display: flex; flex-wrap: wrap; }
    .bulk-actions .count { font-weight: 500; color: var(--text); }
    .bulk-actions select { padding: 6px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .row-cb { cursor: pointer; }
    .row-cb { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <a href="/" class="brand">&larr; Article Reader</a>
      <a href="/">Reader</a>
      <a href="/quiz">Quiz</a>
      <a href="/summary" target="_blank">Summary</a>
    </nav>

    <h1>Vocabulary</h1>
    <p class="subtitle">Manage your saved words. Edit inline and filter by importance or date.</p>

    <div class="action-bar">
      <button id="load-default" class="btn btn-primary">Load saved vocabulary</button>
      <button id="load-csv-btn" class="btn btn-secondary">Load from CSV file</button>
      <input type="file" id="csv-input" accept=".csv" style="display: none;">
    </div>

    <div id="filters" class="filters" style="display: none;">
      <label>Importance</label>
      <select id="filter-importance">
        <option value="">All</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
      <label>Date range</label>
      <select id="filter-date">
        <option value="">All</option>
        <option value="1">Last 1 day</option>
        <option value="3">Last 3 days</option>
        <option value="7">Last 1 week</option>
        <option value="14">Last 2 weeks</option>
        <option value="30">Last 1 month</option>
      </select>
      <label>Status</label>
      <select id="filter-status">
        <option value="">All</option>
        <option value="Master">Master</option>
        <option value="Vague">Vague</option>
        <option value="Don't remember">Don't remember</option>
      </select>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
      <div id="bulk-actions" class="bulk-actions">
        <span class="count" id="bulk-count">0 selected</span>
        <button type="button" id="bulk-delete-btn" class="btn btn-danger btn-delete">Delete selected</button>
        <select id="bulk-status">
          <option value="">Set status...</option>
          <option value="Master">Master</option>
          <option value="Vague">Vague</option>
          <option value="Don't remember">Don't remember</option>
        </select>
        <select id="bulk-importance">
          <option value="">Set importance...</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <button type="button" id="bulk-apply-btn" class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;">Apply</button>
        <button type="button" id="bulk-clear-btn" class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;">Clear selection</button>
      </div>
      <div id="table-container">
        <p class="empty-state" id="empty-msg">Click "Load saved vocabulary" to view your words.</p>
        <div class="table-wrap" id="table-wrap" style="display: none;">
          <table id="vocab-table">
            <thead>
              <tr>
                <th style="width: 36px;" id="th-cb"><input type="checkbox" id="select-all" class="row-cb" title="Select all" style="display: none;"></th>
                <th>Date</th>
                <th>Word</th>
                <th>Meaning</th>
                <th>Importance</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="vocab-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const loadDefaultBtn = document.getElementById('load-default');
    const loadCsvBtn = document.getElementById('load-csv-btn');
    const csvInput = document.getElementById('csv-input');
    const emptyMsg = document.getElementById('empty-msg');
    const tableWrap = document.getElementById('table-wrap');
    const vocabTable = document.getElementById('vocab-table');
    const vocabBody = document.getElementById('vocab-body');
    const filtersDiv = document.getElementById('filters');
    const filterImportance = document.getElementById('filter-importance');
    const filterDate = document.getElementById('filter-date');
    const filterStatus = document.getElementById('filter-status');

    let allEntries = [];
    let fromServer = false;

    function importanceOptions(val) {
      const opts = ['', '1', '2', '3', '4', '5'];
      return opts.map(v => `<option value="${escapeHtml(v)}" ${v === (val || '') ? 'selected' : ''}>${v || '—'}</option>`).join('');
    }

    function statusOptions(val) {
      const opts = ['', 'Master', 'Vague', "Don't remember"];
      return opts.map(v => `<option value="${escapeHtml(v)}" ${v === (val || '') ? 'selected' : ''}>${v || '—'}</option>`).join('');
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function applyFilters() {
      const imp = filterImportance.value;
      const days = filterDate.value ? parseInt(filterDate.value) : null;
      const status = filterStatus.value;
      const now = new Date();
      const cutoff = days ? new Date(now.getTime() - days * 24 * 60 * 60 * 1000) : null;

      return allEntries
        .map((e, i) => [e, i])
        .filter(([e]) => {
          if (imp && (e.importance || '') !== imp) return false;
          if (status && (e.status || '') !== status) return false;
          if (cutoff) {
            const d = parseDate(e.date);
            if (!d || d < cutoff) return false;
          }
          return true;
        });
    }

    function renderTable(entries, isFromServer = false) {
      allEntries = entries;
      fromServer = isFromServer;
      const pairs = fromServer ? applyFilters() : entries.map((e, i) => [e, i]);
      const toRender = pairs.map(([e]) => e);
      const indices = pairs.map(([, i]) => i);

      filtersDiv.style.display = fromServer && allEntries.length ? 'flex' : 'none';

      if (!toRender.length) {
        emptyMsg.textContent = fromServer
          ? (allEntries.length ? 'No entries match the filter.' : 'No entries found.')
          : 'Click "Load saved vocabulary" to view your words.';
        emptyMsg.style.display = 'block';
        emptyMsg.className = 'empty-state';
        tableWrap.style.display = 'none';
        return;
      }
      emptyMsg.style.display = 'none';
      tableWrap.style.display = 'block';
      vocabBody.innerHTML = toRender.map((e, i) => {
        const origIdx = indices[i];
        const word = escapeHtml(e.word || '');
        const meaning = escapeHtml(e.concise_meaning || e.meaning || '');
        const date = escapeHtml(e.date || '');
        const importance = e.importance || '';
        const status = e.status || '';
        if (fromServer) {
          return `
            <tr data-index="${origIdx}">
              <td><input type="checkbox" class="row-cb" data-index="${origIdx}"></td>
              <td>${date}</td>
              <td><input type="text" value="${word}" data-field="word"></td>
              <td><input type="text" value="${meaning}" data-field="concise_meaning"></td>
              <td><select data-field="importance">${importanceOptions(importance)}</select></td>
              <td><select data-field="status">${statusOptions(status)}</select></td>
              <td><button type="button" class="btn btn-danger btn-delete" data-index="${origIdx}">Delete</button></td>
            </tr>
          `;
        }
        return `
          <tr>
            <td></td>
            <td>${date}</td>
            <td>${word}</td>
            <td>${meaning}</td>
            <td>${importance || '—'}</td>
            <td>${status || '—'}</td>
            <td></td>
          </tr>
        `;
      }).join('');

      if (fromServer) {
        document.getElementById('select-all').style.display = '';
        vocabBody.querySelectorAll('input:not(.row-cb), select').forEach(el => {
          el.addEventListener('change', () => saveRow(el.closest('tr').dataset.index));
          el.addEventListener('blur', () => saveRow(el.closest('tr').dataset.index));
        });
        vocabBody.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', () => deleteRow(parseInt(btn.dataset.index)));
        });
        vocabBody.querySelectorAll('.row-cb').forEach(cb => {
          cb.addEventListener('change', updateBulkActions);
        });
      } else {
        document.getElementById('select-all').style.display = 'none';
      }
      updateBulkActions();
    }

    function getSelectedIndices() {
      return Array.from(vocabBody.querySelectorAll('.row-cb:checked')).map(cb => parseInt(cb.dataset.index));
    }

    function updateBulkActions() {
      const indices = getSelectedIndices();
      const bulkBar = document.getElementById('bulk-actions');
      const countEl = document.getElementById('bulk-count');
      if (indices.length > 0 && fromServer) {
        bulkBar.classList.add('visible');
        countEl.textContent = indices.length + ' selected';
      } else {
        bulkBar.classList.remove('visible');
      }
    }

    let saveTimeouts = {};
    async function saveRow(index) {
      clearTimeout(saveTimeouts[index]);
      saveTimeouts[index] = setTimeout(async () => {
        const tr = vocabBody.querySelector(`tr[data-index="${index}"]`);
        if (!tr) return;
        const word = tr.querySelector('[data-field="word"]').value.trim();
        const meaning = tr.querySelector('[data-field="concise_meaning"]').value.trim();
        const importance = tr.querySelector('[data-field="importance"]').value;
        const status = tr.querySelector('[data-field="status"]').value;
        try {
          const res = await fetch(`/api/vocabulary/${index}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word, concise_meaning: meaning, importance, status })
          });
          if (res.ok) {
            allEntries[index] = { ...allEntries[index], word, concise_meaning: meaning, importance, status };
            renderTable(allEntries, fromServer);
          }
        } catch (err) {
          console.error('Save failed:', err);
        }
      }, 300);
    }

    async function deleteRow(index) {
      if (!confirm('Delete this entry?')) return;
      try {
        const res = await fetch(`/api/vocabulary/${index}`, { method: 'DELETE' });
        if (res.ok) {
          const data = await fetch('/api/vocabulary').then(r => r.json());
          renderTable(data.entries || [], true);
        }
      } catch (err) {
        console.error('Delete failed:', err);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('select-all').addEventListener('change', (e) => {
      vocabBody.querySelectorAll('.row-cb').forEach(cb => { cb.checked = e.target.checked; });
      updateBulkActions();
    });

    document.getElementById('bulk-delete-btn').addEventListener('click', async () => {
      const indices = getSelectedIndices();
      if (!indices.length || !confirm(`Delete ${indices.length} selected entr${indices.length === 1 ? 'y' : 'ies'}?`)) return;
      try {
        const res = await fetch('/api/vocabulary/bulk-delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ indices })
        });
        if (res.ok) {
          const data = await fetch('/api/vocabulary').then(r => r.json());
          renderTable(data.entries || [], true);
        }
      } catch (err) {
        console.error('Bulk delete failed:', err);
      }
    });

    document.getElementById('bulk-apply-btn').addEventListener('click', async () => {
      const status = document.getElementById('bulk-status').value;
      const importance = document.getElementById('bulk-importance').value;
      if (!status && !importance) return;
      const indices = getSelectedIndices();
      if (!indices.length) return;
      const payload = { indices };
      if (status) payload.status = status;
      if (importance) payload.importance = importance;
      try {
        const res = await fetch('/api/vocabulary/bulk-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          const data = await fetch('/api/vocabulary').then(r => r.json());
          renderTable(data.entries || [], true);
          document.getElementById('bulk-status').value = '';
          document.getElementById('bulk-importance').value = '';
        }
      } catch (err) {
        console.error('Bulk update failed:', err);
      }
    });

    document.getElementById('bulk-clear-btn').addEventListener('click', () => {
      vocabBody.querySelectorAll('.row-cb').forEach(cb => { cb.checked = false; });
      document.getElementById('select-all').checked = false;
      updateBulkActions();
    });

    filterImportance.addEventListener('change', () => {
      if (fromServer && allEntries.length) renderTable(allEntries, true);
    });
    filterDate.addEventListener('change', () => {
      if (fromServer && allEntries.length) renderTable(allEntries, true);
    });
    filterStatus.addEventListener('change', () => {
      if (fromServer && allEntries.length) renderTable(allEntries, true);
    });

    loadDefaultBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/vocabulary');
        const data = await res.json();
        renderTable(data.entries || [], true);
      } catch (err) {
        emptyMsg.textContent = 'Error loading: ' + err.message;
        emptyMsg.style.display = 'block';
      }
    });

    loadCsvBtn.addEventListener('click', () => csvInput.click());

    csvInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result;
        const lines = text.trim().split('\n');
        if (lines.length < 2) {
          renderTable([]);
          return;
        }
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
        const entries = [];
        for (let i = 1; i < lines.length; i++) {
          const values = parseCsvLine(lines[i]);
          const row = {};
          headers.forEach((h, j) => { row[h] = values[j] || ''; });
          if (row.date || row.word || row.concise_meaning || row.meaning) {
            entries.push(row);
          }
        }
        renderTable(entries);
      };
      reader.readAsText(file, 'UTF-8');
      csvInput.value = '';
    });

    function parseCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          inQuotes = !inQuotes;
        } else if (c === ',' && !inQuotes) {
          result.push(current.replace(/^"|"$/g, '').trim());
          current = '';
        } else {
          current += c;
        }
      }
      result.push(current.replace(/^"|"$/g, '').trim());
      return result;
    }
  </script>
</body>
</html>
