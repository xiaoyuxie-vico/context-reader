<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary - Article Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/usage.js"></script>
  <style>
    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      height: 240px;
      padding: 24px 0;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
      height: 100%;
    }
    .bar {
      width: 100%;
      max-width: 56px;
      min-height: 8px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-hover) 100%);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: height 0.3s ease;
    }
    .bar-group:hover .bar {
      opacity: 0.9;
    }
    .bar-label {
      font-size: 12px;
      font-weight: 500;
      margin-top: 12px;
      text-align: center;
      word-break: break-all;
      color: var(--text);
    }
    .bar-value {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: center;
    }
    .bar-time {
      font-size: 11px;
      color: var(--accent);
      margin-top: 2px;
      font-weight: 500;
    }
    .nav-links {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <a href="/" class="brand">&larr; Article Reader</a>
      <a href="/vocabulary">Vocabulary</a>
      <a href="/quiz">Quiz</a>
      <a href="/">Reader</a>
    </nav>

    <h1>Vocabulary Summary</h1>
    <p class="subtitle">Words added and time in app per date</p>

    <div id="usage-card" class="card" style="margin-bottom: 20px;">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
        <div>
          <p style="margin: 0; font-size: 15px;"><strong>Total time in app</strong></p>
          <p id="usage-time" style="margin: 8px 0 0 0; font-size: 1.25rem; color: var(--accent);">—</p>
        </div>
        <button type="button" id="reset-usage-btn" class="btn btn-secondary" style="font-size: 13px;">Reset</button>
      </div>
    </div>

    <div class="card">
      <div id="chart-container" class="chart-container" style="display: none;"></div>
      <p class="empty-state" id="empty-msg">Loading...</p>
    </div>

    <div class="nav-links">
      <a href="/vocabulary">View vocabulary</a>
      <a href="/">Article Reader</a>
    </div>
  </div>

  <script>
    const chartContainer = document.getElementById('chart-container');
    const emptyMsg = document.getElementById('empty-msg');

    function formatUsage(seconds) {
      if (!seconds) return '0 min';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (h > 0) return h + 'h ' + m + 'm';
      return m + ' min';
    }

    async function loadSummary() {
      try {
        const res = await fetch('/api/vocabulary/summary');
        const data = await res.json();
        const byDate = data.by_date || {};
        const usageByDate = data.usage_by_date || {};
        const entries = Object.entries(byDate);
        const totalSeconds = data.total_usage_seconds || 0;

        document.getElementById('usage-time').textContent = formatUsage(totalSeconds);

        if (!entries.length) {
          emptyMsg.textContent = 'No vocabulary or usage data yet. Add words from the Article Reader; time in app appears here after you use the app.';
          emptyMsg.style.display = 'block';
          chartContainer.style.display = 'none';
          return;
        }

        emptyMsg.style.display = 'none';
        chartContainer.style.display = 'flex';

        const maxCount = Math.max(...entries.map(([, c]) => c), 0);
        const maxBarHeight = 180;

        chartContainer.innerHTML = entries.map(([date, count]) => {
          const barHeight = maxCount > 0 ? Math.max((count / maxCount) * maxBarHeight, 16) : 16;
          const daySeconds = usageByDate[date] != null ? usageByDate[date] : 0;
          return `
            <div class="bar-group">
              <div class="bar" style="height: ${barHeight}px"></div>
              <div class="bar-label">${formatDate(date)}</div>
              <div class="bar-value">${count} word${count !== 1 ? 's' : ''}</div>
              <div class="bar-time">${formatUsage(daySeconds)}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        emptyMsg.textContent = 'Error loading: ' + err.message;
        emptyMsg.style.display = 'block';
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return isNaN(d) ? dateStr : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    document.getElementById('reset-usage-btn').addEventListener('click', async function() {
      if (!confirm('Reset total time to zero? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/usage', { method: 'DELETE' });
        if (res.ok) {
          loadSummary();
        } else {
          alert('Failed to reset.');
        }
      } catch (err) {
        alert('Failed to reset: ' + err.message);
      }
    });

    loadSummary();
  </script>
</body>
</html>
