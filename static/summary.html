<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary - Article Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      height: 240px;
      padding: 24px 0;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
      height: 100%;
    }
    .bar {
      width: 100%;
      max-width: 56px;
      min-height: 8px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-hover) 100%);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: height 0.3s ease;
    }
    .bar-group:hover .bar {
      opacity: 0.9;
    }
    .bar-label {
      font-size: 12px;
      font-weight: 500;
      margin-top: 12px;
      text-align: center;
      word-break: break-all;
      color: var(--text);
    }
    .bar-value {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .nav-links {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <a href="/" class="brand">&larr; Article Reader</a>
      <a href="/vocabulary">Vocabulary</a>
      <a href="/">Reader</a>
    </nav>

    <h1>Vocabulary Summary</h1>
    <p class="subtitle">Words added per date</p>

    <div class="card">
      <div id="chart-container" class="chart-container" style="display: none;"></div>
      <p class="empty-state" id="empty-msg">Loading...</p>
    </div>

    <div class="nav-links">
      <a href="/vocabulary">View vocabulary</a>
      <a href="/">Article Reader</a>
    </div>
  </div>

  <script>
    const chartContainer = document.getElementById('chart-container');
    const emptyMsg = document.getElementById('empty-msg');

    async function loadSummary() {
      try {
        const res = await fetch('/api/vocabulary/summary');
        const data = await res.json();
        const byDate = data.by_date || {};
        const entries = Object.entries(byDate);

        if (!entries.length) {
          emptyMsg.textContent = 'No vocabulary data yet. Add words from the Article Reader.';
          emptyMsg.style.display = 'block';
          chartContainer.style.display = 'none';
          return;
        }

        emptyMsg.style.display = 'none';
        chartContainer.style.display = 'flex';

        const maxCount = Math.max(...entries.map(([, c]) => c));
        const maxBarHeight = 180;

        chartContainer.innerHTML = entries.map(([date, count]) => {
          const barHeight = maxCount > 0 ? Math.max((count / maxCount) * maxBarHeight, 16) : 16;
          return `
            <div class="bar-group">
              <div class="bar" style="height: ${barHeight}px"></div>
              <div class="bar-label">${formatDate(date)}</div>
              <div class="bar-value">${count} word${count !== 1 ? 's' : ''}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        emptyMsg.textContent = 'Error loading: ' + err.message;
        emptyMsg.style.display = 'block';
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return isNaN(d) ? dateStr : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    loadSummary();
  </script>
</body>
</html>
